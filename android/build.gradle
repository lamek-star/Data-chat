// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Keep generated Android outputs outside OneDrive to avoid file-lock failures.
def dataChatBuildRoot = new File(System.getProperty("java.io.tmpdir"), "datachat-android-build")
rootProject.buildDir = new File(dataChatBuildRoot, "root")
subprojects { project ->
    project.buildDir = new File(dataChatBuildRoot, project.name)
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
